openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Multi-Agent Trip Logistics Coordinator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: trips
    description: Trip planning operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Logout (client-side token removal)
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /plan-trip:
    post:
      operationId: planTrip
      tags: [trips]
      summary: Start a multi-agent trip planning session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripRequest"
      responses:
        "202":
          description: Trip planning started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripSession"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trip-stream/{sessionId}:
    get:
      operationId: streamTripUpdates
      tags: [trips]
      summary: Stream live agent updates via SSE
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE stream of agent events
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Session not found

  /trips/{sessionId}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get the completed trip plan
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Completed trip plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripPlan"
        "202":
          description: Still planning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripSession"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trips/{sessionId}/agents:
    get:
      operationId: getAgentStatuses
      tags: [trips]
      summary: Get current status of all agents for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of agent statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentStatus"
        "404":
          description: Session not found

  /trips/{sessionId}/execute:
    post:
      operationId: executeTrip
      tags: [trips]
      summary: Trigger the Executioner Agent to simulate booking
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Executioner started
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Trip not yet complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AuthRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string

    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      required:
        - user
      properties:
        user:
          type: object
          required:
            - id
            - email
            - name
          properties:
            id:
              type: string
            email:
              type: string
            name:
              type: string

    TripRequest:
      type: object
      required:
        - destination
        - startDate
        - endDate
        - budget
        - travelers
      properties:
        destination:
          type: string
          description: Destination city and country
        startDate:
          type: string
          format: date
          description: Trip start date (YYYY-MM-DD)
        endDate:
          type: string
          format: date
          description: Trip end date (YYYY-MM-DD)
        budget:
          type: number
          description: Total budget in INR
        travelers:
          type: integer
          minimum: 1
          description: Number of travelers
        originCity:
          type: string
          description: Departure city for transport search (e.g. Mumbai, Delhi)
        preferences:
          type: string
          description: Free-text travel preferences and interests

    TripSession:
      type: object
      required:
        - sessionId
        - status
        - createdAt
      properties:
        sessionId:
          type: string
        status:
          type: string
          enum: [planning, completed, failed, booked]
        createdAt:
          type: string
          format: date-time
        request:
          $ref: "#/components/schemas/TripRequest"

    AgentStatus:
      type: object
      required:
        - agentId
        - name
        - status
      properties:
        agentId:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [idle, working, approved, rejected, retrying, done]
        currentTask:
          type: ["string", "null"]
        lastMessage:
          type: ["string", "null"]
        updatedAt:
          type: string
          format: date-time

    TransportModeOption:
      type: object
      required:
        - mode
        - duration
        - summary
      properties:
        mode:
          type: string
          enum: [flight, train, road]
        price:
          type: ["number", "null"]
        duration:
          type: string
        summary:
          type: string

    TransportOption:
      type: object
      required:
        - id
        - mode
        - provider
        - departure
        - arrival
        - price
        - duration
      properties:
        id:
          type: string
        mode:
          type: string
          enum: [flight, train, road]
        provider:
          type: string
        departure:
          type: string
        arrival:
          type: string
        price:
          type: number
        duration:
          type: string
        stops:
          type: integer
        comparison:
          type: ["string", "null"]
        allOptions:
          type: array
          items:
            $ref: "#/components/schemas/TransportModeOption"
        reasoning:
          type: ["string", "null"]

    HotelOption:
      type: object
      required:
        - id
        - name
        - location
        - pricePerNight
        - rating
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: string
        pricePerNight:
          type: number
        totalPrice:
          type: number
        rating:
          type: number
        amenities:
          type: array
          items:
            type: string
        reasoning:
          type: ["string", "null"]

    Activity:
      type: object
      required:
        - id
        - name
        - category
        - estimatedCost
        - duration
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        estimatedCost:
          type: number
        duration:
          type: string
        description:
          type: ["string", "null"]
        timeSlot:
          type: ["string", "null"]
        reasoning:
          type: ["string", "null"]

    ItineraryDay:
      type: object
      required:
        - day
        - date
        - activities
        - dailyCost
      properties:
        day:
          type: integer
        date:
          type: string
        activities:
          type: array
          items:
            $ref: "#/components/schemas/Activity"
        dailyCost:
          type: number
        notes:
          type: ["string", "null"]

    BudgetBreakdown:
      type: object
      required:
        - totalBudget
        - spent
        - remaining
        - transport
        - hotel
        - activities
        - miscellaneous
      properties:
        totalBudget:
          type: number
        spent:
          type: number
        remaining:
          type: number
        transport:
          type: number
        hotel:
          type: number
        activities:
          type: number
        miscellaneous:
          type: number

    TripPlan:
      type: object
      required:
        - sessionId
        - status
        - request
        - budget
        - days
        - createdAt
      properties:
        sessionId:
          type: string
        status:
          type: string
          enum: [planning, completed, failed, booked]
        request:
          $ref: "#/components/schemas/TripRequest"
        transport:
          $ref: "#/components/schemas/TransportOption"
        hotel:
          $ref: "#/components/schemas/HotelOption"
        days:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryDay"
        budget:
          $ref: "#/components/schemas/BudgetBreakdown"
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentStatus"
        bookingStatus:
          type: string
          enum: [idle, booking, booked]
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
